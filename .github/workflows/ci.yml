name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: impl

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip maturin -r tests/requirements.txt

      - name: Lint Rust core
        run: cargo clippy --manifest-path impl/Cargo.toml --all-targets -- -D warnings

      - name: Lint Rust server feature
        run: cargo clippy --manifest-path impl/Cargo.toml --all-targets --features server -- -D warnings

      - name: Lint Rust python feature
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
        run: cargo clippy --manifest-path impl/Cargo.toml --all-targets --features python -- -D warnings

      - name: Run Rust tests
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
        run: cargo test --manifest-path impl/Cargo.toml --lib --features server

      - name: Build Python wheel
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: '1'
        run: |
          cd impl
          maturin build --release

      - name: Install Python package
        run: python -m pip install --force-reinstall impl/target/wheels/livetable-*.whl

      - name: Run Python tests
        run: pytest -c tests/pytest.ini

  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build
